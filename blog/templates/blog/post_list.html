<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Django Girls Gulakandoz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f7941d, #ffb347);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .left h3 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 15px;
      opacity: 0.95;
    }

    .left h1 {
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .left p {
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 30px;
      max-width: 600px;
      color: #fffaf3;
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      transition: 0.3s ease;
      display: inline-block;
    }

    .btn-primary {
      background: white;
      color: #f57c00;
    }

    .btn-primary:hover {
      background: #fff2df;
      transform: translateY(-2px);
    }

    .btn-secondary {
      border: 2px solid white;
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .right {
      display: flex;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 35px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255,255,255,0.25);
    }

    .card h2 {
      font-size: 30px;
      margin-bottom: 20px;
    }

    .info-item {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
    }

    .info-item span {
      display: block;
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .info-item strong {
      font-size: 19px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .tag {
      background: white;
      color: #f57c00;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 22px;
      font-size: 15px;
      color: #fff8ee;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .left h1 {
        font-size: 46px;
      }

      .left p {
        margin-left: auto;
        margin-right: auto;
      }

      .buttons {
        justify-content: center;
      }

      .right {
        margin-top: 10px;
      }
    }

    @media (max-width: 500px) {
      .left h1 {
        font-size: 36px;
      }

      .left p {
        font-size: 17px;
      }

      .card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h3>WELCOME TO</h3>
      <h1>Django Girls<br>Gulakandoz</h1>
      <p>
        Learn Python and Django in a friendly, supportive, and inspiring environment.
        Build your first website step by step together with mentors and a great community.
      </p>

      <div class="buttons">
        <a href="#" class="btn btn-primary">Join the Workshop</a>
        <a href="#" class="btn btn-secondary">Learn More</a>
      </div>
    </div>

    <div class="right">
      <div class="card">
        <h2>Workshop Info</h2>
